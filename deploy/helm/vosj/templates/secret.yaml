# secret.yaml — chart-managed Secret (only when secret.create=true AND no existingSecret).
# Contains NO real secret material in the chart: values default to "" and are meant to
# be supplied at install time via --set / --set-file (e.g. openssl rand -hex 32).
# Empty values are intentional and FAIL-CLOSED: the app refuses to sign the ledger or
# operate the vault if the key is missing — it never substitutes a default.
{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-secret" (include "vosj.fullname" .) }}
  labels:
    {{- include "vosj.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secret.keys.ledgerHmacKey }}: {{ .Values.secret.values.ledgerHmacKey | quote }}
  {{ .Values.secret.keys.vaultMasterKey }}: {{ .Values.secret.values.vaultMasterKey | quote }}
  {{ .Values.secret.keys.authToken }}: {{ .Values.secret.values.authToken | quote }}
  {{ .Values.secret.keys.pgPassword }}: {{ .Values.secret.values.pgPassword | quote }}
{{- end }}
