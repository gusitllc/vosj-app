# =============================================================================
# devstation.yaml — parameterized POC devstation seat (lean look-alike image).
#
# Uses the lean vosj-devstation image (codercom/code-server + Claude Code CLI;
# built from deploy/poc/devstation-image/). Functionally "similar to the
# devstations we have now": a code-server IDE + `claude` on PATH, password login,
# and the SAME credential model as the fleet — every var arrives via envFrom the
# per-seat Secret `${DEVSTATION_SECRET}` (devstation-<i>-env):
#   PASSWORD                 -> code-server login (set = CODE_SERVER_PASSWORD)
#   CLAUDE_CODE_OAUTH_TOKEN  -> Hybrid mode (interactive Claude Code, Max OAuth)
#   ANTHROPIC_API_KEY        -> AI-only mode (headless Claude, API key)
# A fresh seat is "empty" (no credential, worker off); the Seat Manager website
# writes the credential into this Secret and restarts the seat.
#
# Rendered per-seat by 30-deploy-devstations.sh via `envsubst`. Substituted vars:
#   ${DEVSTATION_NAME} ${NAMESPACE_DEV} ${DEVSTATION_IMAGE} ${DEVSTATION_SECRET}
#   ${DEVSTATION_PORT} ${ACR_PULL_SECRET}
#   ${DEVSTATION_CPU_REQUEST} ${DEVSTATION_CPU_LIMIT}
#   ${DEVSTATION_MEM_REQUEST} ${DEVSTATION_MEM_LIMIT}
#
# HARD PLATFORM RULE: EPHEMERAL — NO per-pod PVC. The cluster CSI cannot absorb
# many simultaneous volume attaches; per-pod PVCs across a fleet wedged the disk
# CSI once already. All writable paths are emptyDir. Retention (if ever needed) is
# via a DB harvest, NEVER per-pod volumes.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${DEVSTATION_NAME}
  namespace: ${NAMESPACE_DEV}
  labels:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
    app.kubernetes.io/part-of: vosj-poc
    devstation/seat: "${DEVSTATION_NAME}"
spec:
  replicas: 1
  # Recreate (not RollingUpdate): a seat is a single ephemeral identity; we do not
  # want two pods fighting over the same emptyDir-backed workspace.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: devstation
      app.kubernetes.io/instance: ${DEVSTATION_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devstation
        app.kubernetes.io/instance: ${DEVSTATION_NAME}
        app.kubernetes.io/part-of: vosj-poc
    spec:
      # A devstation seat has no business calling the Kubernetes API — drop the token.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: false   # the code-server image manages its own 'coder' user
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ${ACR_PULL_SECRET}
      containers:
        - name: code-server
          image: ${DEVSTATION_IMAGE}
          # Always: the mutable :poc tag is rebuilt (e.g. new extension entrypoint);
          # a restart must re-pull. The lean image's changed layer is tiny (cached base).
          imagePullPolicy: Always
          # code-server's upstream entrypoint takes these as code-server args.
          args:
            - "--bind-addr"
            - "0.0.0.0:${DEVSTATION_PORT}"
            - "/home/coder/project"
          # All config (PASSWORD + the assigned credential) comes from the -env Secret.
          envFrom:
            - secretRef:
                name: ${DEVSTATION_SECRET}
          ports:
            - name: http
              containerPort: ${DEVSTATION_PORT}
          resources:
            requests:
              cpu: "${DEVSTATION_CPU_REQUEST}"
              memory: "${DEVSTATION_MEM_REQUEST}"
            limits:
              cpu: "${DEVSTATION_CPU_LIMIT}"
              memory: "${DEVSTATION_MEM_LIMIT}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            # EPHEMERAL ONLY — emptyDir. NO PVC (platform CSI hard lesson).
            - name: project
              mountPath: /home/coder/project
            - name: config
              mountPath: /home/coder/.config
            - name: local
              mountPath: /home/coder/.local
      volumes:
        - name: project
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: local
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${DEVSTATION_NAME}
  namespace: ${NAMESPACE_DEV}
  labels:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
    app.kubernetes.io/part-of: vosj-poc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
  ports:
    - name: http
      port: 80
      targetPort: http
