# =============================================================================
# devstation.yaml — parameterized devstation (code-server + Claude dev seat).
#
# Rendered per-seat by 30-deploy-devstations.sh via `envsubst`. Substituted vars:
#   ${DEVSTATION_NAME}      e.g. devstation-1
#   ${NAMESPACE_DEV}        target namespace
#   ${DEVSTATION_IMAGE}     code-server image (configurable)
#   ${DEVSTATION_PORT}      container port
#   ${DEVSTATION_SECRET}    per-seat Secret name (CODE_SERVER_PASSWORD + token)
#   ${DEVSTATION_CPU_REQUEST} ${DEVSTATION_CPU_LIMIT}
#   ${DEVSTATION_MEM_REQUEST} ${DEVSTATION_MEM_LIMIT}
#
# HARD PLATFORM RULE: EPHEMERAL — NO per-pod PVC. The cluster CSI cannot absorb
# many simultaneous volume attaches; per-pod PVCs across a fleet wedged the disk
# CSI once already. All writable paths are emptyDir. Retention (if ever needed)
# is via a DB harvest, NEVER per-pod volumes.
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ${DEVSTATION_NAME}
  namespace: ${NAMESPACE_DEV}
  labels:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
    app.kubernetes.io/part-of: vosj-poc
    devstation/seat: "${DEVSTATION_NAME}"
spec:
  replicas: 1
  # Recreate (not RollingUpdate): a devstation is a single ephemeral seat; we do
  # not want two pods fighting over the same emptyDir-backed identity.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: devstation
      app.kubernetes.io/instance: ${DEVSTATION_NAME}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: devstation
        app.kubernetes.io/instance: ${DEVSTATION_NAME}
        app.kubernetes.io/part-of: vosj-poc
    spec:
      securityContext:
        runAsNonRoot: false   # code-server image manages its own non-root user
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: code-server
          image: ${DEVSTATION_IMAGE}
          imagePullPolicy: IfNotPresent
          args:
            - "--bind-addr"
            - "0.0.0.0:${DEVSTATION_PORT}"
            - "/home/coder/project"
          ports:
            - name: http
              containerPort: ${DEVSTATION_PORT}
          env:
            # code-server reads PASSWORD for its login gate.
            - name: PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ${DEVSTATION_SECRET}
                  key: CODE_SERVER_PASSWORD
            # Claude Code reads CLAUDE_CODE_OAUTH_TOKEN (the platform's confirmed
            # var name — the CLI does NOT read CLAUDE_TOKEN). Optional: the key
            # may be empty if no seat token was provisioned.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ${DEVSTATION_SECRET}
                  key: CLAUDE_CODE_OAUTH_TOKEN
                  optional: true
            - name: DEVSTATION_NAME
              value: "${DEVSTATION_NAME}"
          resources:
            requests:
              cpu: "${DEVSTATION_CPU_REQUEST}"
              memory: "${DEVSTATION_MEM_REQUEST}"
            limits:
              cpu: "${DEVSTATION_CPU_LIMIT}"
              memory: "${DEVSTATION_MEM_LIMIT}"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            # EPHEMERAL ONLY — emptyDir. NO PVC (platform CSI hard lesson).
            - name: project
              mountPath: /home/coder/project
            - name: config
              mountPath: /home/coder/.config
            - name: local
              mountPath: /home/coder/.local
      volumes:
        - name: project
          emptyDir: {}
        - name: config
          emptyDir: {}
        - name: local
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ${DEVSTATION_NAME}
  namespace: ${NAMESPACE_DEV}
  labels:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
    app.kubernetes.io/part-of: vosj-poc
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devstation
    app.kubernetes.io/instance: ${DEVSTATION_NAME}
  ports:
    - name: http
      port: 80
      targetPort: http
